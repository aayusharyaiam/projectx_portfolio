<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F060F"/>
      <stop offset="100%" style="stop-color:#1E0B16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E1306C"/>
      <stop offset="50%" style="stop-color:#F77737"/>
      <stop offset="100%" style="stop-color:#FFC837"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Glowing background elements -->
  <circle cx="400" cy="240" r="130" fill="url(#accent)" opacity="0.06" filter="blur(25px)"/>

  <!-- Instagram logo-like boundary / Bot Head -->
  <g transform="translate(400, 230)">
    <!-- Main rounded rectangle (Instagram style) -->
    <rect x="-80" y="-80" width="160" height="160" rx="40" fill="none" stroke="url(#accent)" stroke-width="4" stroke-opacity="0.8"/>
    
    <!-- Camera/Eye circle (Robot Eye) -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#accent)" stroke-width="4" stroke-opacity="0.8"/>
    <circle cx="0" cy="0" r="10" fill="url(#accent)" opacity="0.9"/>
    
    <!-- Top-Right camera flash dot (robot antenna node) -->
    <circle cx="40" cy="-40" r="10" fill="#FFA726" opacity="0.9"/>

    <!-- Antennas for the robot -->
    <line x1="-40" y1="-80" x2="-60" y2="-110" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-60" cy="-110" r="6" fill="#E1306C" />

    <line x1="40" y1="-80" x2="60" y2="-110" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="-110" r="6" fill="#FFC837" />

    <!-- Gears representing automation (floating) -->
    <g transform="translate(-120, 40)" opacity="0.4" stroke="url(#accent)" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="20" />
      <path d="M-5,-25 L5,-25 L7,-20 L15,-22 L20,-15 L15,-10 L22,-5 L22,5 L15,10 L20,15 L15,22 L7,20 L5,25 L-5,25 L-7,20 L-15,22 L-20,15 L-15,10 L-22,5 L-22,-5 L-15,-10 L-20,-15 L-15,-22 L-7,-20 Z" />
    </g>

    <g transform="translate(120, -40)" opacity="0.4" stroke="url(#accent)" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="25" />
      <path d="M-5,-30 L5,-30 L8,-25 L18,-27 L24,-18 L18,-12 L26,-6 L26,6 L18,12 L24,18 L18,27 L8,25 L5,30 L-5,30 L-8,25 L-18,27 L-24,18 L-18,12 L-26,6 L-26,-6 L-18,-12 L-24,-18 L-18,-27 L-8,-25 Z" />
    </g>

    <!-- Floating hearts and chat bubbles (representing engagement) -->
    <!-- Heart 1 -->
    <path d="M -90,-80 C -100,-90 -115,-90 -120,-80 C -125,-70 -110,-55 -90,-40 C -70,-55 -55,-70 -60,-80 C -65,-90 -80,-90 -90,-80 Z" fill="#E1306C" opacity="0.75" transform="scale(0.8) translate(-40, -40)"/>
    <!-- Heart 2 -->
    <path d="M 90,-80 C 80,-90 65,-90 60,-80 C 55,-70 70,-55 90,-40 C 110,-55 125,-70 120,-80 C 115,-90 100,-90 90,-80 Z" fill="#FF5252" opacity="0.8" transform="scale(0.6) translate(130, -20)"/>
    <!-- Chat bubble -->
    <path d="M -110, 100 C -110, 80 -80, 80 -80, 100 C -80, 110 -90, 120 -110, 125 C -108, 115 -110, 110 -110, 100 Z" fill="#FFC837" opacity="0.7"/>
  </g>

  <!-- Labels -->
  <text x="400" y="480" font-family="sans-serif" font-size="32" font-weight="bold" fill="#F77737" text-anchor="middle" letter-spacing="3">INSTABOT</text>
  <text x="400" y="525" font-family="sans-serif" font-size="16" fill="#8C8C9E" text-anchor="middle" letter-spacing="1">Instagram Engagement Automation Bot</text>
</svg>

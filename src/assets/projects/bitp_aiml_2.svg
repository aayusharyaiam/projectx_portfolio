<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050C0A"/>
      <stop offset="100%" style="stop-color:#0B1814"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Neural Net Background Grid -->
  <g opacity="0.18">
    <line x1="220" y1="220" x2="330" y2="170" stroke="#10B981" stroke-width="1.5" />
    <line x1="220" y1="220" x2="300" y2="310" stroke="#10B981" stroke-width="1.5" />
    <line x1="330" y1="170" x2="470" y2="140" stroke="#06B6D4" stroke-width="2" />
    <line x1="300" y1="310" x2="490" y2="290" stroke="#10B981" stroke-width="1.5" />
    <line x1="470" y1="140" x2="570" y2="220" stroke="#06B6D4" stroke-width="1.5" />
    <line x1="490" y1="290" x2="570" y2="220" stroke="#06B6D4" stroke-width="2" />
    <line x1="330" y1="170" x2="490" y2="290" stroke="#10B981" stroke-width="1" />
    <line x1="300" y1="310" x2="470" y2="140" stroke="#10B981" stroke-width="1" />
  </g>

  <!-- Glowing nodes -->
  <circle cx="220" cy="220" r="7" fill="#10B981" opacity="0.85" />
  <circle cx="330" cy="170" r="9" fill="#06B6D4" opacity="0.9" />
  <circle cx="300" cy="310" r="6" fill="#10B981" opacity="0.75" />
  <circle cx="470" cy="140" r="11" fill="#06B6D4" opacity="0.9" />
  <circle cx="490" cy="290" r="8" fill="#10B981" opacity="0.8" />
  <circle cx="570" cy="220" r="10" fill="#06B6D4" opacity="0.9" />

  <!-- Big Futuristic Number "2" -->
  <g transform="translate(400, 220)">
    <circle cx="0" cy="0" r="90" fill="url(#accent)" opacity="0.08" filter="blur(15px)"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="12, 6"/>
    <text x="0" y="35" font-family="sans-serif" font-size="100" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.85">2</text>
  </g>

  <!-- Network wave ring -->
  <path d="M 280 200 A 150 150 0 0 1 520 200" fill="none" stroke="url(#accent)" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="6, 6"/>

  <!-- Labels -->
  <text x="400" y="475" font-family="sans-serif" font-size="28" font-weight="bold" fill="#10B981" text-anchor="middle" letter-spacing="1">BITP AI/ML 2025</text>
  <text x="400" y="520" font-family="sans-serif" font-size="16" fill="#8C8C9E" text-anchor="middle" letter-spacing="0.5">2nd International Conference Platform</text>
</svg>
